<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 52 52" fill="none">
  <!-- Signal broadcast arcs -->
  <path d="M18.5 10 Q25 4.5 31.5 10" stroke="white" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  <path d="M14.5 6.5 Q25 -1 35.5 6.5" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Antenna circle with highlight -->
  <circle cx="25" cy="13.5" r="3" fill="white"/>
  <circle cx="24" cy="12.5" r="0.8" fill="white" opacity="0.5"/>

  <!-- Antenna stem -->
  <line x1="25" y1="16.5" x2="25" y2="19.5" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Robot head -->
  <rect x="8" y="19.5" width="34" height="20" rx="6.5" stroke="white" stroke-width="3.2" fill="none"/>
  <!-- Inner visor/screen area -->
  <rect x="13" y="23" width="24" height="10" rx="3" stroke="white" stroke-width="0.8" fill="none" opacity="0.25"/>

  <!-- Eyes (large capsule shapes) -->
  <rect x="13.5" y="24.5" width="9" height="7" rx="3.5" fill="white"/>
  <rect x="27.5" y="24.5" width="9" height="7" rx="3.5" fill="white"/>

  <!-- Mouth -->
  <rect x="18.5" y="34" width="13" height="2.5" rx="1.25" fill="white"/>

  <!-- Ear bumps with connection lines -->
  <circle cx="5" cy="29.5" r="3.8" fill="white"/>
  <line x1="8.5" y1="29.5" x2="8" y2="29.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="45" cy="29.5" r="3.8" fill="white"/>
  <line x1="41.5" y1="29.5" x2="42" y2="29.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Body/torso -->
  <rect x="14.5" y="40.5" width="21" height="6.5" rx="3.2" fill="white"/>
  <!-- Body detail indicators -->
  <circle cx="20" cy="43.7" r="1" fill="white" opacity="0.3"/>
  <circle cx="25" cy="43.7" r="1" fill="white" opacity="0.3"/>
  <circle cx="30" cy="43.7" r="1" fill="white" opacity="0.3"/>

  <!-- Cable/wire from body -->
  <path d="M35.5 43.5 C39 43.5, 41.5 45.5, 44 49" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Subtle shadow line below body -->
  <line x1="19" y1="49" x2="31" y2="49" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.2"/>
</svg>
