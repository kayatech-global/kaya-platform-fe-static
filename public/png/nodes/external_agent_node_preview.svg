<svg xmlns="http://www.w3.org/2000/svg" width="200" height="180" viewBox="0 0 200 180" fill="none">
  <!-- Shadow background -->
  <rect x="25" y="15" width="160" height="160" rx="20" fill="#5520C0" opacity="0.5"/>
  <!-- Main background -->
  <rect x="20" y="10" width="160" height="160" rx="20" fill="#6c3def"/>
  <!-- Subtle border glow on background -->
  <rect x="20" y="10" width="160" height="160" rx="20" stroke="white" stroke-width="1" fill="none" opacity="0.12"/>

  <!-- Connection handles -->
  <ellipse cx="15" cy="90" rx="8" ry="10" fill="#6c3def" opacity="0.5"/>
  <ellipse cx="185" cy="90" rx="8" ry="10" fill="#6c3def" opacity="0.5"/>

  <!-- Signal broadcast arcs -->
  <path d="M82 35 Q100 21 118 35" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M73 27 Q100 9 127 27" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.55"/>
  <path d="M65 20 Q100 -1 135 20" stroke="white" stroke-width="2.8" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- Antenna circle with highlight -->
  <circle cx="100" cy="42" r="6" fill="white"/>
  <circle cx="98" cy="40" r="1.5" fill="white" opacity="0.4"/>

  <!-- Antenna stem -->
  <line x1="100" y1="48" x2="100" y2="57" stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Robot head -->
  <rect x="59" y="57" width="82" height="46" rx="15" stroke="white" stroke-width="5" fill="none"/>
  <!-- Inner visor/screen area -->
  <rect x="69" y="64" width="62" height="24" rx="6" stroke="white" stroke-width="1.2" fill="none" opacity="0.2"/>

  <!-- Eyes (large capsule shapes) -->
  <rect x="71" y="66" width="20" height="15" rx="7.5" fill="white"/>
  <rect x="109" y="66" width="20" height="15" rx="7.5" fill="white"/>

  <!-- Mouth -->
  <rect x="83" y="88" width="34" height="5.5" rx="2.8" fill="white"/>

  <!-- Ear bumps with connection detail -->
  <circle cx="51" cy="80" r="8.5" fill="white" opacity="0.8"/>
  <line x1="59" y1="80" x2="59.5" y2="80" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <circle cx="149" cy="80" r="8.5" fill="white" opacity="0.8"/>
  <line x1="141" y1="80" x2="140.5" y2="80" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Body/torso -->
  <rect x="74" y="105" width="52" height="17" rx="7" fill="white"/>
  <!-- Body detail indicators -->
  <circle cx="88" cy="113.5" r="2.2" fill="#6c3def" opacity="0.3"/>
  <circle cx="100" cy="113.5" r="2.2" fill="#6c3def" opacity="0.3"/>
  <circle cx="112" cy="113.5" r="2.2" fill="#6c3def" opacity="0.3"/>

  <!-- Cable/wire from body -->
  <path d="M126 113 C134 113, 140 118, 147 128" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Cable end dot -->
  <circle cx="148" cy="129.5" r="2" fill="white" opacity="0.6"/>

  <!-- Subtle glow outline on head -->
  <rect x="57" y="55" width="86" height="50" rx="17" stroke="white" stroke-width="1.5" fill="none" opacity="0.1"/>

  <!-- Reflection line below body -->
  <line x1="85" y1="130" x2="115" y2="130" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
</svg>
